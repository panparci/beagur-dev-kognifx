services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bea_guru}
      POSTGRES_USER: ${POSTGRES_USER:-bea_guru_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - bea_guru_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bea_guru_app} -d ${POSTGRES_DB:-bea_guru}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/migrate", "up"]

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_NAME: bea-guru-api
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      BETTER_AUTH_JWKS_URL: ${BETTER_AUTH_JWKS_URL:?BETTER_AUTH_JWKS_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      AI_MODELS: ${AI_MODELS:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Bea Guru}
      INTERNAL_NOTIFY_SECRET: ${INTERNAL_NOTIFY_SECRET:-}
      UPLOAD_DIR: /app/uploads
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-bea-guru-media}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    volumes:
      - bea_guru_uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth:
    image: ${AUTH_IMAGE:?AUTH_IMAGE is required}
    restart: unless-stopped
    environment:
      AUTH_SERVER_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      API_INTERNAL_URL: http://api:8080
      INTERNAL_NOTIFY_SECRET: ${INTERNAL_NOTIFY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
      auth:
        condition: service_healthy

volumes:
  bea_guru_pg_data:
  bea_guru_uploads:
