name: Build and Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build, Test, and Push Images
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.images.outputs.image_prefix }}
      commit_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image prefix
        id: images
        run: echo "image_prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: be/go.mod
          cache-dependency-path: be/go.sum

      - name: Test backend
        working-directory: be
        run: go test ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fe/package-lock.json

      - name: Build frontend
        working-directory: fe
        run: |
          npm ci
          npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: be/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.image_prefix }}/api:${{ github.sha }}
            ${{ steps.images.outputs.image_prefix }}/api:latest

      - name: Build and push auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fe/Dockerfile.auth
          push: true
          tags: |
            ${{ steps.images.outputs.image_prefix }}/auth:${{ github.sha }}
            ${{ steps.images.outputs.image_prefix }}/auth:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fe/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.image_prefix }}/web:${{ github.sha }}
            ${{ steps.images.outputs.image_prefix }}/web:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            umask 077

            IMAGE_PREFIX="${{ needs.build-and-push.outputs.image_prefix }}"
            COMMIT_SHA="${{ needs.build-and-push.outputs.commit_sha }}"

            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            # Write .env.production using printf — no sed escaping needed for docker compose env files
            printf 'API_IMAGE=%s/api:%s\n' "${IMAGE_PREFIX}" "${COMMIT_SHA}" > .env.production
            printf 'AUTH_IMAGE=%s/auth:%s\n' "${IMAGE_PREFIX}" "${COMMIT_SHA}" >> .env.production
            printf 'WEB_IMAGE=%s/web:%s\n' "${IMAGE_PREFIX}" "${COMMIT_SHA}" >> .env.production
            printf 'WEB_PORT=%s\n' "${{ secrets.WEB_PORT }}" >> .env.production
            printf 'POSTGRES_DB=%s\n' "${{ secrets.POSTGRES_DB }}" >> .env.production
            printf 'POSTGRES_USER=%s\n' "${{ secrets.POSTGRES_USER }}" >> .env.production
            printf 'POSTGRES_PASSWORD=%s\n' "${{ secrets.POSTGRES_PASSWORD }}" >> .env.production
            printf 'DATABASE_URL=%s\n' "${{ secrets.DATABASE_URL }}" >> .env.production
            printf 'FRONTEND_URL=%s\n' "${{ secrets.FRONTEND_URL }}" >> .env.production
            printf 'ALLOWED_ORIGINS=%s\n' "${{ secrets.ALLOWED_ORIGINS }}" >> .env.production
            printf 'BETTER_AUTH_URL=%s\n' "${{ secrets.BETTER_AUTH_URL }}" >> .env.production
            printf 'BETTER_AUTH_JWKS_URL=%s\n' "${{ secrets.BETTER_AUTH_JWKS_URL }}" >> .env.production
            printf 'BETTER_AUTH_SECRET=%s\n' "${{ secrets.BETTER_AUTH_SECRET }}" >> .env.production
            printf 'OPENROUTER_API_KEY=%s\n' "${{ secrets.OPENROUTER_API_KEY }}" >> .env.production
            printf 'OPENROUTER_SITE_URL=%s\n' "${{ secrets.OPENROUTER_SITE_URL }}" >> .env.production
            printf 'AI_MODELS=%s\n' "${{ secrets.AI_MODELS }}" >> .env.production
            printf 'GOOGLE_CLIENT_ID=%s\n' "${{ secrets.GOOGLE_CLIENT_ID }}" >> .env.production
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env.production
            printf 'BREVO_API_KEY=%s\n' "${{ secrets.BREVO_API_KEY }}" >> .env.production
            printf 'EMAIL_FROM=%s\n' "${{ secrets.EMAIL_FROM }}" >> .env.production
            printf 'EMAIL_FROM_NAME=%s\n' "${{ secrets.EMAIL_FROM_NAME }}" >> .env.production
            printf 'INTERNAL_NOTIFY_SECRET=%s\n' "${{ secrets.INTERNAL_NOTIFY_SECRET }}" >> .env.production
            printf 'LOG_LEVEL=%s\n' "${{ secrets.LOG_LEVEL }}" >> .env.production

            dc() {
              docker compose                 --env-file .env.production                 -f docker-compose.prod.yml                 "$@"
            }

            dc config -q
            dc pull

            dc up -d postgres
            dc run --rm migrate

            docker rm -f beaguru-migrate-1 2>/dev/null || true

            dc up -d               --force-recreate               --remove-orphans               api auth web

            WEB_PORT="${{ secrets.WEB_PORT }}"
            WEB_PORT="${WEB_PORT:-3003}"

            healthy=false

            for attempt in $(seq 1 30); do
              if curl -fsS                    "http://127.0.0.1:${WEB_PORT}/healthz"                    >/dev/null &&
                 curl -fsS                    "http://127.0.0.1:${WEB_PORT}/readyz"                    >/dev/null; then
                healthy=true
                break
              fi

              sleep 2
            done

            if [ "$healthy" != "true" ]; then
              echo "Deployment health check failed"
              dc ps
              dc logs --tail 100 api auth web
              exit 1
            fi

            echo "Deployment health check passed"
            dc ps
            docker image prune -f
